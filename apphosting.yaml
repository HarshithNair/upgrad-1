# apphosting.yaml
runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

env:
  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
  - variable: GOOGLE_CLIENT_EMAIL
    secret: GOOGLE_CLIENT_EMAIL
  - variable: GOOGLE_PRIVATE_KEY
    secret: GOOGLE_PRIVATE_KEY
  - variable: GOOGLE_SHEET_ID
    secret: GOOGLE_SHEET_ID
